<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>

    <style>
      body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        font-family: "Segoe UI", sans-serif;
        background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      }

      /* Glass effect container */
      .calculator {
        width: 320px;
        padding: 20px;
        border-radius: 20px;

        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);

        border: 1px solid rgba(255, 255, 255, 0.2);
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      }

      /* Display */
      .display {
        height: 70px;
        background: rgba(255, 255, 255, 0.15);
        border-radius: 12px;
        margin-bottom: 15px;

        display: flex;
        align-items: center;
        justify-content: flex-end;

        padding: 10px 15px;
        font-size: 28px;
        color: #fff;

        overflow: hidden;
        box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.3);
      }

      /* Grid buttons */
      .buttons {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 12px;
      }

      /* Base button style */
      button {
        padding: 15px;
        font-size: 18px;
        border: none;
        border-radius: 12px;
        cursor: pointer;

        transition: all 0.2s ease;
        color: white;

        background: rgba(255, 255, 255, 0.1);
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
      }

      /* Hover effect */
      button:hover {
        transform: translateY(-3px);
        background: rgba(255, 255, 255, 0.2);
      }

      /* Click effect */
      button:active {
        transform: scale(0.95);
      }

      /* Number buttons */
      .number {
        background: rgba(255, 255, 255, 0.15);
      }

      /* Operators */
      .operator {
        background: linear-gradient(135deg, #ff6a00, #ee0979);
      }

      /* Clear button */
      .clear {
        background: linear-gradient(135deg, #ff416c, #ff4b2b);
      }

      /* Equal button */
      .equal {
        grid-column: span 2;
        background: linear-gradient(135deg, #00c6ff, #0072ff);
      }
    </style>
  </head>

  <body>
    <div class="calculator">
      <div class="display" id="display">0</div>

      <div class="buttons">
        <button class="clear" onclick="clearDisplay()">C</button>
        <button class="operator" onclick="append('/')">/</button>
        <button class="operator" onclick="append('*')">*</button>
        <button class="operator" onclick="deleteLast()">⌫</button>

        <button class="number" onclick="append('7')">7</button>
        <button class="number" onclick="append('8')">8</button>
        <button class="number" onclick="append('9')">9</button>
        <button class="operator" onclick="append('-')">-</button>

        <button class="number" onclick="append('4')">4</button>
        <button class="number" onclick="append('5')">5</button>
        <button class="number" onclick="append('6')">6</button>
        <button class="operator" onclick="append('+')">+</button>

        <button class="number" onclick="append('1')">1</button>
        <button class="number" onclick="append('2')">2</button>
        <button class="number" onclick="append('3')">3</button>
        <button class="number" onclick="append('0')">0</button>

        <button class="equal" onclick="calculate()">=</button>
      </div>
    </div>

    <script>
      let display = document.getElementById("display");

      function append(value) {
        if (display.innerText === "0") {
          display.innerText = value;
        } else {
          display.innerText += value;
        }
      }

      function clearDisplay() {
        display.innerText = "0";
      }

      function deleteLast() {
        display.innerText = display.innerText.slice(0, -1) || "0";
      }

      function calculate() {
        try {
          display.innerText = eval(display.innerText);
        } catch {
          display.innerText = "Error";
        }
      }
    </script>
  </body>
</html>
